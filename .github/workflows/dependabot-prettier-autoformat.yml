name: Auto-format on Prettier bump

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  autoformat:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Skip unless prettier was bumped
        if: ${{ !contains(steps.meta.outputs.dependency-names, 'prettier') }}
        run: |
          echo "Not a prettier bump — skipping"
          exit 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci

      - name: Re-format with new Prettier
        run: npm run format

      - name: Commit and push if changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "dependabot[bot]"
            git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: apply prettier $(node -p "require('./package.json').devDependencies.prettier")"
            git push
          fi
